name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy (force, no cache)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.vercel.com/v1/integrations/deploy/prj_0LXezZlCO4Q62QrXDlW0WZfY1SBx/LohcAFuyqY")
          echo "Vercel deploy triggered: HTTP $STATUS"
          if [ "$STATUS" != "201" ]; then
            echo "Warning: unexpected status $STATUS"
          fi
